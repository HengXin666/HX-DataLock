name: SDK Tests

on:
  push:
    paths:
      - "sdk/node/**"
      - "sdk/py/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/sdk-tests.yml"
  pull_request:
    paths:
      - "sdk/node/**"
      - "sdk/py/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/sdk-tests.yml"
  workflow_dispatch:

jobs:
  python-sdk-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Run Python SDK tests
        run: uv run pytest tests/py/test_v1_foundation.py -q

  node-sdk-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Run Node SDK surface tests
        run: |
          uv run pytest tests/compat/test_cross_language.py::test_node_sdk_exposes_v1_datalock_surface -q
          uv run pytest tests/compat/test_cross_language.py::test_node_sdk_open_text_reports_invalid_utf8_with_stable_error_code -q

  cross-sdk-compatibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Run cross-SDK compatibility tests
        run: uv run pytest tests/compat/test_cross_language.py -q
